<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Sim — Design &amp; Trade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d10;
    --panel:#12151a;
    --panel-2:#171b21;
    --line:#232830;
    --line-soft:#1b2027;
    --text:#e6e9ee;
    --muted:#828b98;
    --muted-2:#5b6371;
    --accent:#5eead4;
    --accent-dim:#2c4744;
    --danger:#f2748a;
    --danger-dim:#3a2229;
    --warn:#f0b458;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', system-ui, sans-serif;
    min-height:100vh;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  ::selection{ background:var(--accent-dim); }

  /* ---------- layout shell ---------- */
  .shell{ max-width:1080px; margin:0 auto; padding:0 20px 60px; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 0 18px; border-bottom:1px solid var(--line);
    margin-bottom:22px; gap:16px; flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:26px;height:26px;border:1.5px solid var(--accent);border-radius:6px;
    position:relative; flex:none;
  }
  .brand-mark::after{
    content:"";position:absolute; left:50%; top:5px; width:3px; height:3px;
    background:var(--accent); border-radius:50%; transform:translateX(-50%);
  }
  .brand-text{ font-weight:700; letter-spacing:.02em; font-size:15px; }
  .brand-sub{ font-size:11px; color:var(--muted-2); font-family:'JetBrains Mono',monospace; letter-spacing:.06em; text-transform:uppercase;}

  .mode-toggle{ display:flex; background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:3px; }
  .mode-toggle button{
    border:none; background:transparent; color:var(--muted); padding:8px 18px;
    font-family:inherit; font-size:13px; font-weight:600; border-radius:6px; cursor:pointer;
    transition:.15s;
  }
  .mode-toggle button.active{ background:var(--accent); color:#08211d; }

  /* ---------- sub-tab bars (create section / component type) ---------- */
  .subtab-bar{ display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
  .subtab-bar button{
    border:1px solid var(--line); background:var(--panel); color:var(--muted); padding:8px 16px;
    font-family:inherit; font-size:12.5px; font-weight:600; border-radius:7px; cursor:pointer; transition:.15s;
  }
  .subtab-bar button:hover{ color:var(--text); border-color:var(--muted-2); }
  .subtab-bar button.active{ background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }
  .subtab-bar.small button{ padding:6px 12px; font-size:12px; }

  /* ---------- buttons ---------- */
  .btn{
    font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
    border-radius:7px; border:1px solid var(--line); background:var(--panel-2);
    color:var(--text); padding:9px 14px; transition:.15s; display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{ border-color:var(--accent); color:var(--accent); }
  .btn-primary{ background:var(--accent); border-color:var(--accent); color:#08211d; }
  .btn-primary:hover{ filter:brightness(1.08); color:#08211d; }
  .btn-danger{ color:var(--danger); }
  .btn-danger:hover{ border-color:var(--danger); color:var(--danger); background:var(--danger-dim); }
  .btn-ghost{ background:transparent; border-color:transparent; color:var(--muted); }
  .btn-ghost:hover{ color:var(--accent); }
  .btn-sm{ padding:6px 10px; font-size:12px; border-radius:6px; }
  .btn[disabled]{ opacity:.35; cursor:not-allowed; }
  .btn[disabled]:hover{ border-color:var(--line); color:var(--text); }

  /* ---------- section header ---------- */
  .section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap;}
  .section-title{ font-size:18px; font-weight:600; }
  .section-title small{ display:block; font-size:11px; color:var(--muted-2); font-weight:500; text-transform:uppercase; letter-spacing:.08em; margin-top:2px; font-family:'JetBrains Mono',monospace;}

  /* ---------- grid / cards ---------- */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:14px; }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px;
    display:flex; flex-direction:column; gap:10px; position:relative;
  }
  .card-new{
    display:flex; align-items:center; justify-content:center; min-height:120px;
    border:1.5px dashed var(--line); background:transparent; cursor:pointer; color:var(--muted);
    font-weight:600; font-size:13px; transition:.15s;
  }
  .card-new:hover{ border-color:var(--accent); color:var(--accent); }
  .card-title{ font-weight:600; font-size:15px; display:flex; align-items:center; gap:8px;}
  .hidden-tag{ font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-2); border:1px solid var(--line); padding:2px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace;}
  .type-tag{ font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); border:1px solid var(--accent-dim); padding:2px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace;}
  .card-meta{ font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; line-height:1.7;}
  .card-meta b{ color:var(--text); font-weight:500;}
  .card-actions{ display:flex; gap:6px; flex-wrap:wrap; margin-top:auto; padding-top:8px; border-top:1px solid var(--line-soft);}
  .thumb{
    width:100%; aspect-ratio:1/1; background:var(--panel-2); border-radius:8px; border:1px solid var(--line-soft);
    overflow:hidden; max-height:150px; margin:0 auto;
  }
  .thumb svg{ width:100%; height:100%; display:block; }

  /* ---------- forms ---------- */
  .field{ display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  .field label{ font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted-2); font-weight:600; font-family:'JetBrains Mono',monospace;}
  .field input, .field select{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:9px 11px; border-radius:7px; font-family:'JetBrains Mono',monospace; font-size:13px; outline:none; width:100%;
  }
  .field input:focus{ border-color:var(--accent); }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .hint{ font-size:11px; color:var(--muted-2); margin-top:-2px; }

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(4,5,7,.7); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:24px;
    width:100%; max-width:380px; max-height:90vh; overflow:auto;
  }
  .modal.wide{ max-width:480px; }
  .modal.xwide{ max-width:640px; }
  .modal h3{ margin:0 0 18px; font-size:16px; }
  .color-editor-layout{ display:grid; grid-template-columns:200px 1fr; gap:18px; margin-bottom:16px; }
  @media (max-width:560px){ .color-editor-layout{ grid-template-columns:1fr; } }
  .color-editor-layout .thumb{ max-width:200px; }
  .color-shape-row{ margin-bottom:6px; }
  .color-picker-thumb{ width:48px; height:48px; max-height:48px; flex:none; }
  .optimized-tag{ display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; color:var(--accent); background:rgba(52,211,153,.12); border:1px solid rgba(52,211,153,.35); border-radius:20px; padding:2px 8px; margin-left:8px; vertical-align:middle; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:6px; }
  .picker-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px;
    border:1px solid var(--line-soft); border-radius:8px; margin-bottom:8px; background:var(--panel-2);
  }
  .picker-row .name{ font-size:13px; font-weight:600; }
  .picker-row .sub{ font-size:11px; color:var(--muted-2); font-family:'JetBrains Mono',monospace; margin-top:2px;}

  /* ---------- phone editor ---------- */
  .editor-layout{ display:grid; grid-template-columns:260px 1fr 260px; gap:20px; align-items:start; }
  @media (max-width:880px){ .editor-layout{ grid-template-columns:1fr; } }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .panel-title{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted-2); font-weight:700; margin-bottom:14px; font-family:'JetBrains Mono',monospace;}

  .canvas-toolbar{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .canvas-wrap{
    background:
      linear-gradient(var(--line-soft) 1px, transparent 1px) 0 0/26px 26px,
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0/26px 26px,
      var(--panel-2);
    border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:0 auto;
    width:100%; max-width:480px; aspect-ratio:1/1; position:relative;
  }
  .canvas-wrap svg{ width:100%; height:100%; display:block; touch-action:none; }
  .canvas-caption{ text-align:center; font-size:11px; color:var(--muted-2); margin-top:10px; font-family:'JetBrains Mono',monospace;}
  .shape-el{ cursor:grab; }
  .shape-el:active{ cursor:grabbing; }
  .shape-el.selected{ stroke:var(--accent); stroke-width:2; stroke-dasharray:4 3; }

  .layer-row{
    display:flex; align-items:center; justify-content:space-between; padding:7px 9px;
    border:1px solid var(--line-soft); border-radius:7px; margin-bottom:6px; font-size:12px; cursor:pointer;
    background:var(--panel-2);
  }
  .layer-row.selected{ border-color:var(--accent); color:var(--accent); }
  .layer-row span.swatch{ width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:7px; vertical-align:middle;}
  .empty-note{ color:var(--muted-2); font-size:12px; text-align:center; padding:20px 10px; }

  .prop-empty{ color:var(--muted-2); font-size:12px; line-height:1.6; }

  /* ---------- shape effects (shadow / glow / outline) ---------- */
  .effects-section{ margin-top:6px; padding-top:14px; border-top:1px solid var(--line-soft); }
  .effect-card{
    border:1px solid var(--line-soft); border-radius:8px; padding:11px 12px 2px; margin-bottom:10px;
    background:var(--panel-2);
  }
  .effect-card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .effect-card-title{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); font-family:'JetBrains Mono',monospace; }
  .effect-remove{
    background:transparent; border:1px solid var(--line-soft); color:var(--muted); width:20px; height:20px;
    border-radius:5px; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; line-height:1;
  }
  .effect-remove:hover{ border-color:var(--danger); color:var(--danger); background:var(--danger-dim); }
  .effect-type-picker{ display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; }
  .seg-toggle{ display:flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; margin-bottom:12px; }
  .seg-toggle button{
    flex:1; border:none; background:var(--panel); color:var(--muted); padding:7px 0;
    font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; transition:.15s;
  }
  .seg-toggle button + button{ border-left:1px solid var(--line); }
  .seg-toggle button.active{ background:var(--accent-dim); color:var(--accent); }
  .seg-toggle button:hover:not(.active){ color:var(--text); }

  /* ---------- component-slot rows in phone editor ---------- */
  .slot-row{
    border:1px solid var(--line-soft); border-radius:8px; padding:10px 11px; margin-bottom:10px; background:var(--panel-2);
  }
  .slot-row .slot-label{ font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-2); font-family:'JetBrains Mono',monospace; margin-bottom:6px;}
  .slot-row .slot-chosen{ font-size:13px; font-weight:600; margin-bottom:8px; }
  .slot-row .slot-empty{ font-size:12px; color:var(--muted-2); margin-bottom:8px; }
  .slot-row .slot-btns{ display:flex; gap:6px; flex-wrap:wrap; }
  .cam-chip{
    display:inline-flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--line-soft);
    border-radius:6px; padding:5px 8px; font-size:12px; margin:0 6px 6px 0;
  }
  .cam-chip button{ background:none; border:none; color:var(--muted-2); cursor:pointer; font-size:13px; line-height:1; padding:0;}
  .cam-chip button:hover{ color:var(--danger); }

  /* ---------- slider + number combo ----------
     The slider is the primary, dominant control (flex:1, taller track, bigger thumb).
     The number box is a fixed, comfortably-readable size for precise typing — not tiny,
     but clearly secondary to the slider. Used ONLY for shape properties. */
  .slider-row{ display:flex; align-items:center; gap:12px; }
  .slider-row input[type="range"]{ flex:1 1 auto; min-width:70px; }
  .slider-row .slider-num{ width:72px; flex:0 0 72px; text-align:center; padding:8px 4px; }

  input[type="range"]{
    -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:3px;
    background:var(--line); outline:none; cursor:pointer; margin:0;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:19px; height:19px; border-radius:50%;
    background:var(--accent); cursor:pointer; border:2px solid #08211d; box-shadow:0 0 0 1px var(--accent);
  }
  input[type="range"]::-moz-range-thumb{
    width:19px; height:19px; border-radius:50%; background:var(--accent); cursor:pointer;
    border:2px solid #08211d; box-shadow:0 0 0 1px var(--accent);
  }
  input[type="range"]::-moz-range-track{ background:var(--line); height:6px; border-radius:3px; }

  /* ---------- color field ---------- */
  .color-row{ display:flex; align-items:center; gap:8px; }
  input[type="color"]{
    -webkit-appearance:none; appearance:none; width:42px; height:34px; flex:none;
    border:1px solid var(--line); border-radius:7px; background:var(--panel-2); cursor:pointer; padding:2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper{ padding:0; }
  input[type="color"]::-webkit-color-swatch{ border:none; border-radius:5px; }
  input[type="color"]::-moz-color-swatch{ border:none; border-radius:5px; }
  .color-hex{ flex:1; text-transform:uppercase; }
  .preset-row{ display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
  .preset-swatch{
    width:22px; height:22px; border-radius:6px; border:1px solid var(--line-soft); cursor:pointer;
    padding:0; transition:.15s;
  }
  .preset-swatch:hover{ transform:scale(1.15); border-color:var(--accent); }

  /* ---------- layer row extras ---------- */
  .layer-main{ display:flex; align-items:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .layer-btns{ display:flex; gap:4px; flex:none; margin-left:8px; }
  .layer-btn{
    background:transparent; border:1px solid var(--line-soft); color:var(--muted); width:20px; height:20px;
    border-radius:4px; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    line-height:1; padding:0;
  }
  .layer-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .layer-btn:disabled{ opacity:.3; cursor:not-allowed; }
  .layer-btn:disabled:hover{ border-color:var(--line-soft); color:var(--muted); }

  /* ---------- play mode ---------- */
  .stat-bar{
    display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line);
    border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-bottom:20px;
  }
  @media (max-width:700px){ .stat-bar{ grid-template-columns:repeat(2,1fr);} }
  .stat{ background:var(--panel); padding:16px 18px; }
  .stat .label{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted-2); font-family:'JetBrains Mono',monospace; margin-bottom:6px;}
  .stat .value{ font-size:19px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .stat .value.accent{ color:var(--accent); }

  .play-top{ display:grid; grid-template-columns:180px 1fr; gap:20px; margin-bottom:26px; }
  @media (max-width:640px){ .play-top{ grid-template-columns:1fr; } }
  .equip-box{
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .equip-box .thumb{ max-height:none; }
  .equip-box .name{ font-size:12px; font-weight:600; text-align:center; }
  .equip-box .qual{ font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
  .tf-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px;
    display:flex; flex-direction:column; justify-content:center; gap:10px;
  }
  .tf-panel .tick{ font-size:11px; color:var(--muted-2); font-family:'JetBrains Mono',monospace; }

  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:760px){ .two-col{ grid-template-columns:1fr; } }

  .list-row{
    display:flex; align-items:center; justify-content:space-between; padding:11px 13px;
    border:1px solid var(--line-soft); border-radius:8px; margin-bottom:8px; background:var(--panel);
    gap:10px; flex-wrap:wrap;
  }
  .list-row.equipped{ border-color:var(--accent); background:rgba(94,234,212,.06); }
  .list-row .name{ font-size:13px; font-weight:600; }
  .list-row .sub{ font-size:11px; color:var(--muted-2); font-family:'JetBrains Mono',monospace; margin-top:2px;}
  .list-row .row-actions{ display:flex; gap:6px; flex-wrap:wrap; }
  .qbar{ width:64px; height:4px; background:var(--line); border-radius:2px; overflow:hidden; margin-top:6px;}
  .qbar-fill{ height:100%; background:var(--accent); }

  .comp-spec-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 12px;
    border:1px solid var(--line-soft); border-radius:8px; margin-bottom:8px; background:var(--panel-2);
  }
  .comp-spec-row .name{ font-size:13px; font-weight:600; }
  .comp-spec-row .specs{ font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:3px; line-height:1.6;}
  .comp-spec-row .qual-tag{ font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--muted); }
  .comp-spec-row .qual-tag.low{ color:var(--warn); }

  .back-link{ display:inline-flex; align-items:center; gap:5px; color:var(--muted); font-size:12px; cursor:pointer; margin-bottom:14px; font-family:'JetBrains Mono',monospace; }
  .back-link:hover{ color:var(--accent); }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:10px 18px; border-radius:8px; font-size:13px; z-index:100; opacity:0;
    transition:opacity .2s, transform .2s; pointer-events:none; font-family:'JetBrains Mono',monospace;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-text">Phone Sim</div>
        <div class="brand-sub">design · trade · degrade</div>
      </div>
    </div>
    <div class="mode-toggle" id="modeToggle">
      <button data-mode="create">Create</button>
      <button data-mode="play">Play</button>
      <button id="rankingsBtn" type="button">Rankings</button>
    </div>
  </div>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ==================== STATE ==================== */
const STORAGE_KEY = 'phoneSimData_v3';
let data = loadData();
save(); // persist any one-time migration immediately so it doesn't re-run partially
let ui = {
  mode:'create', view:'list', createSection:'phones', componentTab:'battery',
  browsingShopId:null, shopEditModal:null,
  editingPhoneId:null, draftPhone:null, selectedShapeId:null,
  editingComponentId:null, draftComponent:null, draftComponentType:null,
  editingAppId:null, draftApp:null,
  componentPicker:null, renameModal:null,
  playingAccountId:null, accountModal:null,
  infoModal:null, repairConfirm:null, appsModal:null, appOpenResult:null,
  shopBrowse:null,
  viewingOSId:null, osEditModal:null, versionEditModal:null, osPicker:null,
  storageGroupPicker:null, storageGroupEditModal:null, storageOptionEditModal:null,
  viewingStorageGroupId:null, shopStorageChoice:null,
  colorsListModal:null, colorEditModal:null, shopColorChoice:null,
  rankingsAppsModal:false, rankingsAppView:null,
  appOptAppPicker:false, appOptDraft:null
};

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      if(!d.phones) d.phones = [];
      if(!d.components) d.components = [];
      if(!d.apps) d.apps = [];
      if(!d.shops) d.shops = [];
      if(!d.operatingSystems) d.operatingSystems = [];
      if(!d.osVersions) d.osVersions = [];
      if(!d.accounts) d.accounts = [];
      if(!d.storageOptionGroups) d.storageOptionGroups = [];
      if(!d.storageOptions) d.storageOptions = [];
      if(!d.tick) d.tick = d.tick || 0;
      d.accounts.forEach(a=>{ (a.inventory||[]).forEach(i=>{ if(!i.installedApps) i.installedApps=[]; if(i.storageOptionId===undefined) i.storageOptionId=null; if(i.colorOptionId===undefined) i.colorOptionId=null; }); });
      d.phones.forEach(p=>{
        if(!p.cameraIds) p.cameraIds = [];
        if(p.otherComponentIds===undefined) p.otherComponentIds = [];
        if(p.osId===undefined) p.osId = null;
        if(p.osVersionId===undefined) p.osVersionId = null;
        if(!p.colorOptions) p.colorOptions = [];
        if(!p.appOptimizations) p.appOptimizations = [];
      });
      d.apps.forEach(app=>{
        if(!app.otherRequiredComponentIds) app.otherRequiredComponentIds = [];
        if(!app.osRequirements) app.osRequirements = [];
      });
      migrateShapeCoords(d);
      migrateShops(d);
      migrateStorageSplit(d);
      migrateProcessingQuality(d);
      return d;
    }
  }catch(e){}
  return { phones:[], components:[], apps:[], shops:[], operatingSystems:[], osVersions:[], accounts:[], storageOptionGroups:[], storageOptions:[], tick:0 };
}
/* One-time migration: the design canvas used to be a tall 260x500 box with the
   origin at the top-left corner. It's now a square 420x420 box centered on (0,0),
   and rectangles are now positioned by their center (like every other shape) instead
   of their top-left corner. This re-centers existing shape data so old designs still
   roughly line up rather than jumping to a corner. */
const OLD_CW = 260, OLD_CH = 500;
function migrateShapeCoords(d){
  if(d._coordsV2) return;
  (d.phones||[]).forEach(p=>{
    (p.shapes||[]).forEach(s=>{
      if(s.type==='rect' && s.x!==undefined){
        s.cx = (s.x + s.w/2) - OLD_CW/2;
        s.cy = (s.y + s.h/2) - OLD_CH/2;
        delete s.x; delete s.y;
      } else if('cx' in s){
        s.cx = s.cx - OLD_CW/2;
        s.cy = s.cy - OLD_CH/2;
      } else if(s.type==='line'){
        s.x1 = s.x1 - OLD_CW/2; s.y1 = s.y1 - OLD_CH/2;
        s.x2 = s.x2 - OLD_CW/2; s.y2 = s.y2 - OLD_CH/2;
      }
    });
  });
  d._coordsV2 = true;
}
/* One-time migration: phones now belong to a Shop. Anything created before shops
   existed gets dropped into an auto-created "Unsorted" shop instead of losing its place. */
function migrateShops(d){
  const needsShop = (d.phones||[]).some(p=>!p.shopId);
  if(!needsShop) return;
  let unsorted = d.shops.find(s=>s.name==='Unsorted');
  if(!unsorted){ unsorted = { id:uid(), name:'Unsorted' }; d.shops.unshift(unsorted); }
  d.phones.forEach(p=>{ if(!p.shopId) p.shopId = unsorted.id; });
}
/* One-time migration: RAM and Storage used to be a single combined "storage" component
   type. Each existing combined component becomes a standalone RAM component, plus a new
   Storage Option Group holding one Storage Option (its old capacity, at $0 added cost) so
   existing phones/inventory keep working under the new model. */
function migrateStorageSplit(d){
  if(d._storageSplitV1) return;
  const compIdMap = {}; // old combined component id -> { ramId, groupId, optionId }
  const newComponents = [];
  (d.components||[]).forEach(c=>{
    if(c.type==='storage'){
      const ramComp = { id:uid(), type:'ram', name:c.name, price:c.price, ram:c.ram };
      newComponents.push(ramComp);
      const group = { id:uid(), name:c.name };
      d.storageOptionGroups.push(group);
      const option = { id:uid(), groupId:group.id, name:c.name, capacity:c.storage, addedCost:0 };
      d.storageOptions.push(option);
      compIdMap[c.id] = { ramId:ramComp.id, groupId:group.id, optionId:option.id };
    }
  });
  d.components = (d.components||[]).filter(c=>c.type!=='storage').concat(newComponents);
  (d.phones||[]).forEach(p=>{
    const map = p.storageId ? compIdMap[p.storageId] : null;
    if(map){
      p.ramId = map.ramId;
      p.storageGroupId = map.groupId;
      p._migratedOptionId = map.optionId;
    } else {
      if(p.ramId===undefined) p.ramId = null;
      if(p.storageGroupId===undefined) p.storageGroupId = null;
    }
    delete p.storageId;
  });
  (d.accounts||[]).forEach(a=>{
    (a.inventory||[]).forEach(item=>{
      const p = (d.phones||[]).find(ph=>ph.id===item.phoneId);
      if(p && p._migratedOptionId && !item.storageOptionId) item.storageOptionId = p._migratedOptionId;
    });
  });
  (d.phones||[]).forEach(p=>{ delete p._migratedOptionId; });
  d._storageSplitV1 = true;
}
/* One-time migration: Processing Quality used to belong to Camera components; it now
   belongs to Processor components instead. Carry over any existing app requirement value
   set under the old key so existing apps don't silently lose that requirement. */
function migrateProcessingQuality(d){
  if(d._processingQualityV1) return;
  (d.apps||[]).forEach(app=>{
    if(app.reqs && app.reqs.cameraProcessingQuality && !app.reqs.processingQuality){
      app.reqs.processingQuality = app.reqs.cameraProcessingQuality;
    }
    if(app.reqs) delete app.reqs.cameraProcessingQuality;
  });
  d._processingQualityV1 = true;
}

/* "Newer" is determined by creation order, tracked via a monotonic seq stamped on
   each version at creation time — independent of how versions happen to be displayed. */
function isVersionAtLeast(actualVersionId, requiredVersionId){
  const a = getOSVersion(actualVersionId), r = getOSVersion(requiredVersionId);
  if(!a || !r) return false;
  return a.seq >= r.seq;
}
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

/* ==================== COMPONENT DEFINITIONS ==================== */
const COMPONENT_TYPES = ['battery','processor','screen','camera','ram','other'];
function componentLabel(type){
  return ({ battery:'Battery', processor:'Processor', screen:'Screen', camera:'Camera', ram:'RAM', other:'Other Component' })[type] || type;
}
function componentTypeHasQuality(type){ return type==='battery' || type==='screen'; }
function componentTypeHasPrice(type){ return type!=='other'; }
function defaultComponentDraft(type){
  if(type==='other') return { id:null, type, name:'New Other Component', description:'' };
  const base = { id:null, type, name:'New '+componentLabel(type), price:20 };
  switch(type){
    case 'battery': return { ...base, capacity:3000, durabilityMin:65, durabilityMax:90 };
    case 'processor': return { ...base, performance:50, processingQuality:50 };
    case 'screen': return { ...base, resolution:1080, hertz:60, brightness:500, durabilityMin:65, durabilityMax:90 };
    case 'camera': return { ...base, megapixels:12, sensorSize:1 };
    case 'ram': return { ...base, ram:8 };
  }
}
/* Quality lost this tick: durability is rolled randomly between durabilityMin and durabilityMax
   (so wear speed varies tick to tick), then converted to a loss amount. Higher rolled durability
   = slower wear. */
function degradePerTick(durMin, durMax){
  const lo = Math.min(durMin||0, durMax||0), hi = Math.max(durMin||0, durMax||0);
  const roll = lo + Math.random() * (hi - lo);
  return clamp((100 - roll) / 20, 0, 100);
}
/* Short spec summary for cards / rows */
function componentSpecLine(c){
  switch(c.type){
    case 'battery': return `Capacity ${c.capacity} · Durability ${c.durabilityMin}–${c.durabilityMax}%`;
    case 'processor': return `Performance ${c.performance} · Processing ${c.processingQuality}`;
    case 'screen': return `${c.resolution}p · ${c.hertz}Hz · Brightness ${c.brightness} · Durability ${c.durabilityMin}–${c.durabilityMax}%`;
    case 'camera': return `${c.megapixels}MP · Sensor ${c.sensorSize}`;
    case 'ram': return `RAM ${c.ram}`;
    case 'other': return c.description ? (c.description.length>70 ? c.description.slice(0,70)+'…' : c.description) : 'No description';
  }
}

/* ==================== APP REQUIREMENT DEFINITIONS ==================== */
const REQ_KEYS = ['batteryCapacity','processorPerformance','screenResolution','screenHertz','screenBrightness','cameraMegapixels','cameraSensorSize','processingQuality','ram','optimization'];
const REQ_LABELS = {
  batteryCapacity:'Battery Capacity', processorPerformance:'Processor Performance',
  screenResolution:'Screen Resolution', screenHertz:'Screen Hertz', screenBrightness:'Screen Brightness',
  cameraMegapixels:'Camera Megapixels', cameraSensorSize:'Camera Sensor Size', processingQuality:'Processing Quality',
  ram:'RAM', optimization:'Optimization'
};
function defaultAppDraft(){
  const reqs = {};
  REQ_KEYS.forEach(k=> reqs[k] = { value:null, exact:false, weight:null });
  return { id:null, name:'New App', storageSize:8, reqs, otherRequiredComponentIds:[], osRequirements:[] };
}
/* Actual specs a phone provides, pulled live from its chosen components.
   Cameras: a phone can have several, so each metric uses the best (max) among them.
   Optimization comes from the phone's selected Operating System version. */
function phoneActualSpecs(phone){
  const battery = phone.batteryId ? getComponent(phone.batteryId) : null;
  const processor = phone.processorId ? getComponent(phone.processorId) : null;
  const screen = phone.screenId ? getComponent(phone.screenId) : null;
  const cams = (phone.cameraIds||[]).map(getComponent).filter(Boolean);
  const ramComp = phone.ramId ? getComponent(phone.ramId) : null;
  const version = phone.osVersionId ? getOSVersion(phone.osVersionId) : null;
  return {
    batteryCapacity: battery ? battery.capacity : 0,
    processorPerformance: processor ? processor.performance : 0,
    screenResolution: screen ? screen.resolution : 0,
    screenHertz: screen ? screen.hertz : 0,
    screenBrightness: screen ? screen.brightness : 0,
    cameraMegapixels: cams.length ? Math.max(...cams.map(c=>c.megapixels)) : 0,
    cameraSensorSize: cams.length ? Math.max(...cams.map(c=>c.sensorSize)) : 0,
    processingQuality: processor ? processor.processingQuality : 0,
    ram: ramComp ? ramComp.ram : 0,
    optimization: version ? version.optimization : 0
  };
}
/* Usability % for an app on a phone:
   - blank requirement = ignored (doesn't count toward the average)
   - at exactly the requirement, that stat scores 100%; above it scales linearly (2x => 200%, no cap)
   - below the requirement it falls off twice as fast, hitting 0% at 0.5x the requirement (floored at 0%)
   - "exact or higher" requirements force the WHOLE app to 0% if the phone falls short
   - Other Required Components: the phone must have every one selected, or the app is incompatible
   - Operating System Requirements: the phone's OS+version must match (or exceed) one supported
     pairing, or the app is incompatible. When satisfied it's shown as "Compatible" rather than
     scored — it doesn't raise or lower the averaged percentage. */
/* Phone-specific "App Optimizations" let a phone override an app's requirements
   entirely (spec requirements, weights, required components, OS requirements) without
   touching the app itself or any other phone. If the phone has a profile for this app,
   its customized requirements are used instead of the app's own. */
function getPhoneAppOptimization(phone, appId){
  return (phone.appOptimizations||[]).find(o=>o.appId===appId) || null;
}
function getEffectiveAppRequirements(app, phone){
  const opt = getPhoneAppOptimization(phone, app.id);
  if(opt){
    return { reqs:opt.reqs, otherRequiredComponentIds:opt.otherRequiredComponentIds, osRequirements:opt.osRequirements, optimized:true };
  }
  return { reqs:app.reqs, otherRequiredComponentIds:app.otherRequiredComponentIds, osRequirements:app.osRequirements, optimized:false };
}
function computeUsability(app, phone){
  const specs = phoneActualSpecs(phone);
  const effective = getEffectiveAppRequirements(app, phone);
  let gateFailed = false;
  const breakdown = [];

  /* Only requirements the app actually uses (a filled-in, positive value) participate.
     Each used requirement gets its own Weight (%) toward the final average: a manually
     assigned weight is used as-is, and whatever percentage remains after all manual
     weights is split equally among the requirements left with no weight assigned. */
  const used = [];
  REQ_KEYS.forEach(k=>{
    const req = effective.reqs[k];
    if(!req || req.value===null || req.value===undefined || req.value==='') return;
    const R = parseFloat(req.value);
    if(isNaN(R) || R<=0) return;
    used.push({ key:k, req, R });
  });
  const manualTotal = used.reduce((s,u)=>{
    const w = u.req.weight;
    return s + (w!==null && w!==undefined && !isNaN(w) ? w : 0);
  }, 0);
  const autoEntries = used.filter(u=>{
    const w = u.req.weight;
    return w===null || w===undefined || isNaN(w);
  });
  const remaining = Math.max(0, 100 - manualTotal);
  const autoWeight = autoEntries.length>0 ? remaining/autoEntries.length : 0;

  let weightedSum = 0, weightTotal = 0;
  used.forEach(({key:k, req, R})=>{
    const A = specs[k];
    if(req.exact && A < R) gateFailed = true;
    const ratio = A / R;
    let pct = ratio>=1 ? ratio*100 : (200*ratio - 100);
    pct = Math.max(0, pct);
    const hasManualWeight = req.weight!==null && req.weight!==undefined && !isNaN(req.weight);
    const w = hasManualWeight ? req.weight : autoWeight;
    breakdown.push({ label:REQ_LABELS[k], required:R, actual:A, exact:!!req.exact, pct, weight:fmt(w) });
    weightedSum += pct * w;
    weightTotal += w;
  });

  (effective.otherRequiredComponentIds||[]).forEach(cid=>{
    const comp = getComponent(cid);
    const has = (phone.otherComponentIds||[]).includes(cid);
    if(!has) gateFailed = true;
    breakdown.push({ label: comp ? comp.name : 'Unknown Component', binary:true, ok:has });
  });

  if(effective.osRequirements && effective.osRequirements.length>0){
    const satisfied = effective.osRequirements.some(req=>
      phone.osId===req.osId && phone.osVersionId && isVersionAtLeast(phone.osVersionId, req.versionId)
    );
    if(!satisfied) gateFailed = true;
    breakdown.push({ label:'Operating System', binary:true, ok:satisfied, osGroup:true });
  }

  const usability = gateFailed ? 0 : (weightTotal>0 ? weightedSum/weightTotal : 100);
  return { usability, breakdown, gateFailed, optimized: effective.optimized };
}

/* Ranks every phone that exists (regardless of shop or visibility) against a single
   app's Usability %, highest first. Recomputed fresh every time it's called, so it
   always reflects the latest phone specs / app requirements (or a phone's own App
   Optimization profile, if it has one for this app). Ties break by name so the order
   stays stable and deterministic. */
function getAppRanking(appId){
  const app = getApp(appId);
  if(!app) return [];
  return data.phones
    .map(phone=>{
      const r = computeUsability(app, phone);
      return { phone, usability: r.usability, optimized: r.optimized };
    })
    .sort((x,y)=> y.usability - x.usability || x.phone.name.localeCompare(y.phone.name));
}
/* Where a specific phone currently lands in that same ranking. */
function getPhoneRankInApp(appId, phoneId){
  const ranking = getAppRanking(appId);
  const idx = ranking.findIndex(r=>r.phone.id===phoneId);
  if(idx===-1) return null;
  return { rank: idx+1, total: ranking.length, optimized: ranking[idx].optimized };
}

/* ==================== CANVAS CONST ==================== */
/* Square design canvas, origin (0,0) at the exact center — works for phones, tablets,
   or anything else. Every shape is positioned by its own center, so typing 0 in a
   Center X / Center Y field snaps it to the middle of the canvas on that axis. */
const CW = 600, CH = 600;
const HW = CW/2, HH = CH/2; // 300, 300
const POS_RANGE = Math.max(HW,HH) + 150; // generous room to drag shapes off-canvas

/* ---- polygon point math, shared by triangle / star / hexagon ---- */
function regularPolygonPoints(cx, cy, r, sides, rotationDeg){
  const rot = ((rotationDeg||0) * Math.PI) / 180;
  const pts = [];
  for(let i=0;i<sides;i++){
    const angle = rot + i * (2*Math.PI/sides) - Math.PI/2;
    pts.push((cx + r*Math.cos(angle)).toFixed(2) + ',' + (cy + r*Math.sin(angle)).toFixed(2));
  }
  return pts.join(' ');
}
function starPoints(cx, cy, outerR, innerR, points, rotationDeg){
  const rot = ((rotationDeg||0) * Math.PI) / 180;
  const step = Math.PI / points;
  const pts = [];
  for(let i=0;i<points*2;i++){
    const r = (i%2===0) ? outerR : innerR;
    const angle = rot + i*step - Math.PI/2;
    pts.push((cx + r*Math.cos(angle)).toFixed(2) + ',' + (cy + r*Math.sin(angle)).toFixed(2));
  }
  return pts.join(' ');
}
/* ---- array-of-points versions (used by triangle/star so their edges can be
   rounded into curves — a path needs raw [x,y] pairs, not a pre-joined string) ---- */
function regularPolygonPts(cx, cy, r, sides, rotationDeg){
  const rot = ((rotationDeg||0) * Math.PI) / 180;
  const pts = [];
  for(let i=0;i<sides;i++){
    const angle = rot + i * (2*Math.PI/sides) - Math.PI/2;
    pts.push([cx + r*Math.cos(angle), cy + r*Math.sin(angle)]);
  }
  return pts;
}
function starPointsArr(cx, cy, outerR, innerR, points, rotationDeg){
  const rot = ((rotationDeg||0) * Math.PI) / 180;
  const step = Math.PI / points;
  const pts = [];
  for(let i=0;i<points*2;i++){
    const r = (i%2===0) ? outerR : innerR;
    const angle = rot + i*step - Math.PI/2;
    pts.push([cx + r*Math.cos(angle), cy + r*Math.sin(angle)]);
  }
  return pts;
}
/* ---- turns a closed set of vertices into an SVG path, optionally rounding every
   corner into a curve. Each corner is trimmed back along its two adjacent edges by
   `radius` (clamped to half the shorter edge so tight corners never self-intersect)
   and joined with a quadratic curve using the original vertex as the control point —
   the standard "rounded polygon" technique. radius<=0 just draws straight edges. ---- */
function roundedPolyPath(pts, radius){
  const n = pts.length;
  if(!radius || radius<=0){
    return 'M' + pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join('L') + 'Z';
  }
  const corners = [];
  for(let i=0;i<n;i++){
    const prev = pts[(i-1+n)%n], curr = pts[i], next = pts[(i+1)%n];
    const d1 = Math.hypot(curr[0]-prev[0], curr[1]-prev[1]);
    const d2 = Math.hypot(next[0]-curr[0], next[1]-curr[1]);
    const r = Math.max(0, Math.min(radius, d1/2, d2/2));
    const p1 = d1 ? [curr[0]+(prev[0]-curr[0])/d1*r, curr[1]+(prev[1]-curr[1])/d1*r] : curr;
    const p2 = d2 ? [curr[0]+(next[0]-curr[0])/d2*r, curr[1]+(next[1]-curr[1])/d2*r] : curr;
    corners.push({p1, p2, curr});
  }
  let d = 'M'+corners[0].p1[0].toFixed(2)+','+corners[0].p1[1].toFixed(2)+' ';
  for(let i=0;i<n;i++){
    const c = corners[i];
    d += 'Q'+c.curr[0].toFixed(2)+','+c.curr[1].toFixed(2)+' '+c.p2[0].toFixed(2)+','+c.p2[1].toFixed(2)+' ';
    const nx = corners[(i+1)%n];
    d += 'L'+nx.p1[0].toFixed(2)+','+nx.p1[1].toFixed(2)+' ';
  }
  return d + 'Z';
}

/* ==================== SHAPE EFFECTS (shadow / glow / outline) ====================
   Every shape can carry a small ordered list in shape.effects. Shadow and glow are
   rendered as SVG filter primitives (composited into one <filter> per shape so they
   layer correctly); outline is just a plain stroke on the shape itself.
   Light is always treated as coming from directly above: shadows/insets only ever
   move a touch *downward*, never sideways, so every shape reads consistently lit
   from the same direction — the person only ever controls radius + color. ---- */
let __svgSeq = 0;
let canvasInstanceId = null; // instance id of the live, editable create-mode canvas
function fxFilterId(instanceId, shapeId){ return 'fx_'+instanceId+'_'+shapeId; }

function buildEffectsFilter(shape, instanceId){
  const effects = (shape.effects||[]).filter(e=>e.type==='shadow'||e.type==='glow');
  if(!instanceId || effects.length===0) return null;
  const filterId = fxFilterId(instanceId, shape.id);
  let prims = '';
  const behind = [], ontop = [];
  effects.forEach((fx,i)=>{
    const rid = filterId+'_'+i;
    const radius = Math.max(0, fx.radius||0);
    const color = /^#[0-9a-fA-F]{6}$/.test(fx.color) ? fx.color : '#000000';
    if(fx.type==='glow'){
      prims += `<feGaussianBlur in="SourceAlpha" stdDeviation="${radius}" result="${rid}b"/>`
             + `<feFlood flood-color="${color}" flood-opacity="1" result="${rid}f"/>`
             + `<feComposite in="${rid}f" in2="${rid}b" operator="in" result="${rid}"/>`;
      behind.push(rid);
    } else if(fx.mode==='inner'){
      const dy = Math.max(1, Math.round(radius*0.35));
      prims += `<feComponentTransfer in="SourceAlpha" result="${rid}ia"><feFuncA type="table" tableValues="1 0"/></feComponentTransfer>`
             + `<feGaussianBlur in="${rid}ia" stdDeviation="${radius}" result="${rid}b"/>`
             + `<feOffset in="${rid}b" dx="0" dy="${dy}" result="${rid}o"/>`
             + `<feFlood flood-color="${color}" flood-opacity="1" result="${rid}f"/>`
             + `<feComposite in="${rid}f" in2="${rid}o" operator="in" result="${rid}c"/>`
             + `<feComposite in="${rid}c" in2="SourceGraphic" operator="in" result="${rid}"/>`;
      ontop.push(rid);
    } else {
      const dy = Math.max(1, Math.round(radius*0.35));
      prims += `<feGaussianBlur in="SourceAlpha" stdDeviation="${radius}" result="${rid}b"/>`
             + `<feOffset in="${rid}b" dx="0" dy="${dy}" result="${rid}o"/>`
             + `<feFlood flood-color="${color}" flood-opacity="1" result="${rid}f"/>`
             + `<feComposite in="${rid}f" in2="${rid}o" operator="in" result="${rid}"/>`;
      behind.push(rid);
    }
  });
  const merge = behind.map(r=>`<feMergeNode in="${r}"/>`).join('')
    + `<feMergeNode in="SourceGraphic"/>`
    + ontop.map(r=>`<feMergeNode in="${r}"/>`).join('');
  const filterMarkup = `<filter id="${filterId}" x="-100%" y="-100%" width="300%" height="300%">${prims}<feMerge>${merge}</feMerge></filter>`;
  return { filterId, filterMarkup };
}
/* extra element attributes (filter url + outline stroke) for a shape, given the
   svg instance it's being rendered into */
function effectAttrString(shape, instanceId){
  let attrs = '';
  const fx = buildEffectsFilter(shape, instanceId);
  if(fx) attrs += ` filter="url(#${fx.filterId})"`;
  const outline = (shape.effects||[]).find(e=>e.type==='outline');
  if(outline && shape.type!=='line'){
    const oc = /^#[0-9a-fA-F]{6}$/.test(outline.color) ? outline.color : '#000000';
    attrs += ` stroke="${oc}" stroke-width="${Math.max(0,outline.width||0)}"`;
  }
  return attrs;
}

function cascadeDeleteShop(id){
  const orphans = data.phones.filter(p=>p.shopId===id);
  if(orphans.length>0){
    let unsorted = data.shops.find(s=>s.name==='Unsorted' && s.id!==id);
    if(!unsorted){ unsorted = { id:uid(), name:'Unsorted' }; data.shops.unshift(unsorted); }
    orphans.forEach(p=> p.shopId = unsorted.id);
  }
  data.shops = data.shops.filter(s=>s.id!==id);
}
function deleteShop(id){
  const count = data.phones.filter(p=>p.shopId===id).length;
  const msg = count>0
    ? `Delete this shop permanently? Its ${count} phone${count!==1?'s':''} will be moved to "Unsorted" rather than deleted.`
    : 'Delete this shop permanently?';
  if(!confirm(msg)) return;
  cascadeDeleteShop(id);
  save(); render(); toast('Shop deleted');
}

/* ==================== PHONE SVG RENDER ==================== */
function shapeMarkup(s, editable, instanceId){
  const sel = editable && ui.selectedShapeId===s.id ? ' selected' : '';
  const cls = editable ? ` class="shape-el${sel}"` : '';
  const dataAttr = `data-id="${s.id}"${cls}`;
  const fxAttrs = effectAttrString(s, instanceId);
  switch(s.type){
    case 'rect':
      return `<rect ${dataAttr} x="${s.cx - s.w/2}" y="${s.cy - s.h/2}" width="${s.w}" height="${s.h}" rx="${s.rx||0}" fill="${s.fill}"${fxAttrs}/>`;
    case 'circle':
      return `<circle ${dataAttr} cx="${s.cx}" cy="${s.cy}" r="${s.r}" fill="${s.fill}"${fxAttrs}/>`;
    case 'ellipse':
      return `<ellipse ${dataAttr} cx="${s.cx}" cy="${s.cy}" rx="${s.rx}" ry="${s.ry}" fill="${s.fill}"${fxAttrs}/>`;
    case 'triangle': {
      const pts = regularPolygonPts(s.cx,s.cy,s.size,3,s.rotation);
      return `<path ${dataAttr} d="${roundedPolyPath(pts, s.cornerRadius||0)}" fill="${s.fill}"${fxAttrs}/>`;
    }
    case 'star': {
      const pts = starPointsArr(s.cx,s.cy,s.outerR,s.innerR,s.points||5,s.rotation);
      return `<path ${dataAttr} d="${roundedPolyPath(pts, s.cornerRadius||0)}" fill="${s.fill}"${fxAttrs}/>`;
    }
    case 'hexagon':
      return `<polygon ${dataAttr} points="${regularPolygonPoints(s.cx,s.cy,s.r,6,s.rotation)}" fill="${s.fill}"${fxAttrs}/>`;
    case 'line':
      return `<line ${dataAttr} x1="${s.x1}" y1="${s.y1}" x2="${s.x2}" y2="${s.y2}" stroke="${s.fill}" stroke-width="${s.strokeWidth||6}" stroke-linecap="round"${fxAttrs}/>`;
    default:
      return '';
  }
}
function renderPhoneSVG(phone, editable){
  const instanceId = 'svg'+(++__svgSeq);
  if(editable) canvasInstanceId = instanceId;
  const shapes = phone.shapes || [];
  let defs = '';
  let body = `<rect x="${-HW}" y="${-HH}" width="${CW}" height="${CH}" fill="none"/>`;
  shapes.forEach(s=>{
    const fx = buildEffectsFilter(s, instanceId);
    if(fx) defs += fx.filterMarkup;
    body += shapeMarkup(s, editable, instanceId);
  });
  const defsMarkup = defs ? `<defs>${defs}</defs>` : '';
  return `<svg viewBox="${-HW} ${-HH} ${CW} ${CH}" xmlns="http://www.w3.org/2000/svg">${defsMarkup}${body}</svg>`;
}

/* ---- color variation helpers: an "override" map is { shapeId: fillHex }. Any shape
   not present in the map just keeps its original design color. ---- */
function shapesWithOverrides(shapes, overrides){
  const ov = overrides || {};
  return (shapes||[]).map(s=> ov[s.id]!==undefined ? Object.assign({}, s, { fill: ov[s.id] }) : s);
}
function renderPhoneSVGWithOverrides(phone, overrides, editable){
  return renderPhoneSVG({ shapes: shapesWithOverrides(phone.shapes, overrides) }, editable);
}
function getColorOption(phone, colorOptionId){
  if(!phone || !colorOptionId) return null;
  return (phone.colorOptions||[]).find(c=>c.id===colorOptionId) || null;
}
/* Renders a phone using a specific saved color option (falls back to the plain design
   if the option is missing, e.g. it was deleted after a unit was purchased with it). */
function renderPhoneSVGColored(phone, colorOptionId, editable){
  const co = getColorOption(phone, colorOptionId);
  return renderPhoneSVGWithOverrides(phone, co ? co.overrides : null, editable);
}

/* ---- push a shape's current model values onto its live SVG element ---- */
function applyShapeAttrs(el, s){
  switch(s.type){
    case 'rect':
      el.setAttribute('x', s.cx - s.w/2); el.setAttribute('y', s.cy - s.h/2);
      el.setAttribute('width', s.w); el.setAttribute('height', s.h);
      el.setAttribute('rx', s.rx||0);
      break;
    case 'circle':
      el.setAttribute('cx', s.cx); el.setAttribute('cy', s.cy); el.setAttribute('r', s.r);
      break;
    case 'ellipse':
      el.setAttribute('cx', s.cx); el.setAttribute('cy', s.cy);
      el.setAttribute('rx', s.rx); el.setAttribute('ry', s.ry);
      break;
    case 'triangle':
      el.setAttribute('d', roundedPolyPath(regularPolygonPts(s.cx,s.cy,s.size,3,s.rotation), s.cornerRadius||0));
      break;
    case 'star':
      el.setAttribute('d', roundedPolyPath(starPointsArr(s.cx,s.cy,s.outerR,s.innerR,s.points||5,s.rotation), s.cornerRadius||0));
      break;
    case 'hexagon':
      el.setAttribute('points', regularPolygonPoints(s.cx,s.cy,s.r,6,s.rotation));
      break;
    case 'line':
      el.setAttribute('x1', s.x1); el.setAttribute('y1', s.y1);
      el.setAttribute('x2', s.x2); el.setAttribute('y2', s.y2);
      el.setAttribute('stroke-width', s.strokeWidth||6);
      el.setAttribute('stroke', s.fill);
      break;
  }
  if(s.type !== 'line') el.setAttribute('fill', s.fill);
}

/* ---- keeps a live shape element's filter/outline in sync with its effects list,
   creating/updating/removing the shared <defs> filter as needed ---- */
function applyEffectAttrsLive(el, s){
  const svgEl = el.ownerSVGElement || el.closest('svg');
  if(svgEl) syncShapeFilterDefs(svgEl, s);
  const fx = buildEffectsFilter(s, canvasInstanceId);
  if(fx) el.setAttribute('filter', `url(#${fx.filterId})`);
  else el.removeAttribute('filter');
  const outline = (s.effects||[]).find(e=>e.type==='outline');
  if(outline && s.type!=='line'){
    const oc = /^#[0-9a-fA-F]{6}$/.test(outline.color) ? outline.color : '#000000';
    el.setAttribute('stroke', oc);
    el.setAttribute('stroke-width', Math.max(0, outline.width||0));
  } else if(s.type!=='line'){
    el.removeAttribute('stroke'); el.removeAttribute('stroke-width');
  }
}
function syncShapeFilterDefs(svgEl, shape){
  let defsEl = svgEl.querySelector('defs');
  const filterId = fxFilterId(canvasInstanceId, shape.id);
  const existing = defsEl ? defsEl.querySelector('#'+CSS.escape(filterId)) : null;
  const fx = buildEffectsFilter(shape, canvasInstanceId);
  if(!fx){
    if(existing) existing.remove();
    return;
  }
  if(!defsEl){
    defsEl = document.createElementNS('http://www.w3.org/2000/svg','defs');
    svgEl.insertBefore(defsEl, svgEl.firstChild);
  }
  if(existing) existing.outerHTML = fx.filterMarkup;
  else defsEl.insertAdjacentHTML('beforeend', fx.filterMarkup);
}

/* ---- live-patch a shape straight onto the canvas + layer row, no full re-render ---- */
function updateShapeLiveDOM(shape){
  const svgEl = document.querySelector('.canvas-wrap svg');
  if(svgEl){
    const el = svgEl.querySelector(`[data-id="${shape.id}"]`);
    if(el){ applyShapeAttrs(el, shape); applyEffectAttrsLive(el, shape); }
  }
  const dp = ui.draftPhone;
  const idx = dp ? dp.shapes.findIndex(s=>s.id===shape.id) : -1;
  const main = document.querySelector(`.layer-row[data-shape-id="${shape.id}"] .layer-main`);
  if(main && idx>-1){
    main.innerHTML = `<span class="swatch" style="background:${shape.fill}"></span>${escapeHtml(shapeDisplayName(shape, idx))}`;
  }
}

function field(label, type, value, onInput, inputType){
  const f = document.createElement('div');
  f.className = 'field';
  const l = document.createElement('label'); l.textContent = label;
  const i = document.createElement('input');
  i.type = inputType==='color' ? 'text' : type;
  i.value = value;
  if(type==='number') i.step = 'any';
  i.addEventListener('input', ()=> onInput(i.value));
  f.append(l,i);
  return f;
}
function numOr(v,fallback){ const n = parseFloat(v); return isNaN(n)?fallback:n; }

/* ---- slider + number combo used for every bounded numeric SHAPE property.
   Both controls update state and live-patch the canvas directly via onChange —
   neither one ever triggers a full render(), which is what used to blow away
   focus (and the scroll position) on every keystroke. ---- */
function numField(label, value, min, max, step, onChange){
  const f = document.createElement('div');
  f.className = 'field';
  const l = document.createElement('label'); l.textContent = label;
  const row = document.createElement('div');
  row.className = 'slider-row';
  const range = document.createElement('input');
  range.type = 'range'; range.min = min; range.max = max; range.step = step;
  range.value = clamp(value, min, max);
  const num = document.createElement('input');
  num.type = 'number'; num.step = step;
  num.value = fmt(value);
  num.className = 'slider-num mono';

  range.addEventListener('input', ()=>{
    num.value = range.value;
    onChange(parseFloat(range.value));
  });
  num.addEventListener('input', ()=>{
    if(num.value==='' || num.value==='-') return;
    const v = parseFloat(num.value);
    if(isNaN(v)) return;
    range.value = v; // values outside [min,max] just pin the thumb to an end
    onChange(v);
  });
  row.append(range, num);
  f.append(l, row);
  return f;
}

/* ---- color picker + hex input + quick presets, all three kept in sync ---- */
function colorField(label, value, onChange){
  const f = document.createElement('div');
  f.className = 'field';
  const l = document.createElement('label'); l.textContent = label;
  const row = document.createElement('div');
  row.className = 'color-row';
  const picker = document.createElement('input');
  picker.type = 'color';
  picker.value = /^#[0-9a-fA-F]{6}$/.test(value) ? value : '#888888';
  const hex = document.createElement('input');
  hex.type = 'text'; hex.className = 'mono color-hex'; hex.value = value; hex.maxLength = 7; hex.spellcheck = false;

  picker.addEventListener('input', ()=>{
    hex.value = picker.value;
    onChange(picker.value);
  });
  hex.addEventListener('input', ()=>{
    let v = hex.value.trim();
    if(v && v[0] !== '#') v = '#'+v;
    if(/^#[0-9a-fA-F]{6}$/.test(v)) picker.value = v;
    onChange(hex.value || '#888888');
  });
  row.append(picker, hex);
  f.append(l, row);

  const presets = ['#f2748a','#f0b458','#5eead4','#7aa2f7','#c084fc','#ffffff','#7a8290','#1c2026'];
  const swRow = document.createElement('div');
  swRow.className = 'preset-row';
  presets.forEach(c=>{
    const sw = document.createElement('button');
    sw.type = 'button';
    sw.className = 'preset-swatch';
    sw.style.background = c;
    sw.title = c;
    sw.onclick = ()=>{ picker.value=c; hex.value=c; onChange(c); };
    swRow.appendChild(sw);
  });
  f.appendChild(swRow);
  return f;
}

/* ---- properties panel content, one branch per shape type ---- */
function buildShapeProps(shape){
  const box = document.createElement('div');
  const live = ()=> updateShapeLiveDOM(shape);

  switch(shape.type){
    case 'rect':
      box.appendChild(numField('Width', shape.w, 4, 500, 1, v=>{ shape.w=v; live(); }));
      box.appendChild(numField('Height', shape.h, 4, 500, 1, v=>{ shape.h=v; live(); }));
      box.appendChild(numField('Corner Radius', shape.rx||0, 0, 200, 1, v=>{ shape.rx=v; live(); }));
      box.appendChild(numField('Center X', shape.cx, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cx=v; live(); }));
      box.appendChild(numField('Center Y', shape.cy, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cy=v; live(); }));
      break;
    case 'circle':
      box.appendChild(numField('Radius', shape.r, 2, 220, 1, v=>{ shape.r=v; live(); }));
      box.appendChild(numField('Center X', shape.cx, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cx=v; live(); }));
      box.appendChild(numField('Center Y', shape.cy, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cy=v; live(); }));
      break;
    case 'ellipse':
      box.appendChild(numField('Radius X', shape.rx, 2, 220, 1, v=>{ shape.rx=v; live(); }));
      box.appendChild(numField('Radius Y', shape.ry, 2, 300, 1, v=>{ shape.ry=v; live(); }));
      box.appendChild(numField('Center X', shape.cx, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cx=v; live(); }));
      box.appendChild(numField('Center Y', shape.cy, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cy=v; live(); }));
      break;
    case 'triangle':
      box.appendChild(numField('Size', shape.size, 4, 220, 1, v=>{ shape.size=v; live(); }));
      box.appendChild(numField('Edge Curve', shape.cornerRadius||0, 0, 150, 1, v=>{ shape.cornerRadius=v; live(); }));
      box.appendChild(numField('Rotation °', shape.rotation||0, 0, 360, 1, v=>{ shape.rotation=v; live(); }));
      box.appendChild(numField('Center X', shape.cx, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cx=v; live(); }));
      box.appendChild(numField('Center Y', shape.cy, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cy=v; live(); }));
      break;
    case 'star':
      box.appendChild(numField('Outer Radius', shape.outerR, 4, 200, 1, v=>{ shape.outerR=v; live(); }));
      box.appendChild(numField('Inner Radius', shape.innerR, 2, 180, 1, v=>{ shape.innerR=v; live(); }));
      box.appendChild(numField('Edge Curve', shape.cornerRadius||0, 0, 80, 1, v=>{ shape.cornerRadius=v; live(); }));
      box.appendChild(numField('Points', shape.points||5, 3, 12, 1, v=>{ shape.points=Math.round(v); live(); }));
      box.appendChild(numField('Rotation °', shape.rotation||0, 0, 360, 1, v=>{ shape.rotation=v; live(); }));
      box.appendChild(numField('Center X', shape.cx, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cx=v; live(); }));
      box.appendChild(numField('Center Y', shape.cy, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cy=v; live(); }));
      break;
    case 'hexagon':
      box.appendChild(numField('Radius', shape.r, 4, 200, 1, v=>{ shape.r=v; live(); }));
      box.appendChild(numField('Rotation °', shape.rotation||0, 0, 360, 1, v=>{ shape.rotation=v; live(); }));
      box.appendChild(numField('Center X', shape.cx, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cx=v; live(); }));
      box.appendChild(numField('Center Y', shape.cy, -POS_RANGE, POS_RANGE, 1, v=>{ shape.cy=v; live(); }));
      break;
    case 'line':
      box.appendChild(numField('Thickness', shape.strokeWidth||6, 1, 40, 1, v=>{ shape.strokeWidth=v; live(); }));
      box.appendChild(numField('Start X', shape.x1, -POS_RANGE, POS_RANGE, 1, v=>{ shape.x1=v; live(); }));
      box.appendChild(numField('Start Y', shape.y1, -POS_RANGE, POS_RANGE, 1, v=>{ shape.y1=v; live(); }));
      box.appendChild(numField('End X', shape.x2, -POS_RANGE, POS_RANGE, 1, v=>{ shape.x2=v; live(); }));
      box.appendChild(numField('End Y', shape.y2, -POS_RANGE, POS_RANGE, 1, v=>{ shape.y2=v; live(); }));
      break;
  }
  box.appendChild(colorField(shape.type==='line' ? 'Line Color' : 'Fill Color', shape.fill, v=>{
    shape.fill = v || '#888888'; live();
  }));
  box.appendChild(effectsSection(shape));
  return box;
}

/* ==================== EFFECTS PANEL (shadow / glow / outline) ====================
   Tracked outside `shape` itself: which shape currently has its "+ Effect" type
   picker open. Keyed by shape id so switching shapes never leaves it stuck open. ---- */
let effectPickerOpenFor = null;
const EFFECT_DEFAULTS = {
  shadow: ()=>({ id:uid(), type:'shadow', mode:'outer', radius:10, color:'#000000' }),
  glow:   ()=>({ id:uid(), type:'glow', radius:14, color:'#5eead4' }),
  outline:()=>({ id:uid(), type:'outline', width:3, color:'#000000' }),
};
const EFFECT_LABELS = { shadow:'Shadow', glow:'Glow', outline:'Outline' };

function addEffect(shape, type){
  if(!shape.effects) shape.effects = [];
  shape.effects.push(EFFECT_DEFAULTS[type]());
  updateShapeLiveDOM(shape);
  render();
}
function removeEffect(shape, effectId){
  shape.effects = (shape.effects||[]).filter(e=>e.id!==effectId);
  updateShapeLiveDOM(shape);
  render();
}

function effectsSection(shape){
  const wrap = document.createElement('div');
  wrap.className = 'effects-section';
  const title = document.createElement('div');
  title.className = 'panel-title';
  title.textContent = 'Effects';
  wrap.appendChild(title);

  const effects = shape.effects || [];
  if(effects.length===0){
    const e = document.createElement('div');
    e.className = 'prop-empty';
    e.style.marginBottom = '10px';
    e.textContent = 'No effects on this shape yet.';
    wrap.appendChild(e);
  } else {
    effects.forEach(fx=> wrap.appendChild(effectCard(shape, fx)));
  }

  if(effectPickerOpenFor === shape.id){
    const picker = document.createElement('div');
    picker.className = 'effect-type-picker';
    ['shadow','glow','outline'].forEach(t=>{
      picker.appendChild(mkBtn('+ '+EFFECT_LABELS[t], 'btn-sm', ()=>{
        effectPickerOpenFor = null;
        addEffect(shape, t);
      }));
    });
    picker.appendChild(mkBtn('Cancel','btn-sm btn-ghost', ()=>{ effectPickerOpenFor=null; render(); }));
    wrap.appendChild(picker);
  } else {
    wrap.appendChild(mkBtn('+ Effect','btn-sm', ()=>{ effectPickerOpenFor = shape.id; render(); }));
  }
  return wrap;
}

function effectCard(shape, fx){
  const live = ()=> updateShapeLiveDOM(shape);
  const card = document.createElement('div');
  card.className = 'effect-card';

  const head = document.createElement('div');
  head.className = 'effect-card-head';
  const nameEl = document.createElement('div');
  nameEl.className = 'effect-card-title';
  nameEl.textContent = EFFECT_LABELS[fx.type] || fx.type;
  head.appendChild(nameEl);
  const rm = document.createElement('button');
  rm.type = 'button';
  rm.className = 'effect-remove';
  rm.textContent = '✕';
  rm.title = 'Remove effect';
  rm.onclick = ()=> removeEffect(shape, fx.id);
  head.appendChild(rm);
  card.appendChild(head);

  if(fx.type==='shadow'){
    const seg = document.createElement('div');
    seg.className = 'seg-toggle';
    ['outer','inner'].forEach(mode=>{
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = mode==='outer' ? 'Outer' : 'Inner';
      if(fx.mode===mode) b.className = 'active';
      b.onclick = ()=>{ fx.mode = mode; live(); render(); };
      seg.appendChild(b);
    });
    card.appendChild(seg);
    card.appendChild(numField('Radius', fx.radius, 0, 60, 1, v=>{ fx.radius=v; live(); }));
    card.appendChild(colorField('Shadow Color', fx.color, v=>{ fx.color = v || '#000000'; live(); }));
  } else if(fx.type==='glow'){
    card.appendChild(numField('Radius', fx.radius, 0, 60, 1, v=>{ fx.radius=v; live(); }));
    card.appendChild(colorField('Glow Color', fx.color, v=>{ fx.color = v || '#000000'; live(); }));
  } else if(fx.type==='outline'){
    card.appendChild(numField('Thickness', fx.width, 0, 30, 1, v=>{ fx.width=v; live(); }));
    card.appendChild(colorField('Outline Color', fx.color, v=>{ fx.color = v || '#000000'; live(); }));
  }
  return card;
}

function addShape(type){
  const dp = ui.draftPhone;
  let shape;
  switch(type){
    case 'rect':
      shape = { id:uid(), type:'rect', cx:0, cy:0, w:220, h:340, rx:20, fill:'#7a8290', effects:[] }; break;
    case 'circle':
      shape = { id:uid(), type:'circle', cx:0, cy:-220, r:22, fill:'#1c2026', effects:[] }; break;
    case 'ellipse':
      shape = { id:uid(), type:'ellipse', cx:0, cy:-220, rx:32, ry:18, fill:'#1c2026', effects:[] }; break;
    case 'triangle':
      shape = { id:uid(), type:'triangle', cx:0, cy:0, size:50, rotation:0, cornerRadius:0, fill:'#f0b458', effects:[] }; break;
    case 'star':
      shape = { id:uid(), type:'star', cx:0, cy:0, outerR:40, innerR:18, points:5, rotation:0, cornerRadius:0, fill:'#f0b458', effects:[] }; break;
    case 'hexagon':
      shape = { id:uid(), type:'hexagon', cx:0, cy:0, r:36, rotation:0, fill:'#5eead4', effects:[] }; break;
    case 'line':
      shape = { id:uid(), type:'line', x1:-50, y1:0, x2:50, y2:0, strokeWidth:6, fill:'#5eead4', effects:[] }; break;
    default: return;
  }
  dp.shapes.push(shape);
  ui.selectedShapeId = shape.id;
  render();
}

function duplicateShape(id){
  const dp = ui.draftPhone;
  const s = dp.shapes.find(x=>x.id===id);
  if(!s) return;
  const copy = JSON.parse(JSON.stringify(s));
  copy.id = uid();
  if(copy.name && copy.name.trim()) copy.name = copy.name.trim() + ' Copy';
  if('cx' in copy) copy.cx = clamp(copy.cx+12, -POS_RANGE, POS_RANGE);
  if('cy' in copy) copy.cy = clamp(copy.cy+12, -POS_RANGE, POS_RANGE);
  if('x1' in copy){ copy.x1+=12; copy.y1+=12; copy.x2+=12; copy.y2+=12; }
  dp.shapes.push(copy);
  ui.selectedShapeId = copy.id;
  render();
}

function renameShape(id){
  const dp = ui.draftPhone;
  const s = dp.shapes.find(x=>x.id===id);
  if(!s) return;
  const idx = dp.shapes.indexOf(s);
  const current = (s.name || '').trim() || shapeDisplayName(s, idx);
  ui.renameModal = { shapeId:id, value:current };
  render();
}

function renderRenameModal(){
  const rm = ui.renameModal;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = (e)=>{ if(e.target===overlay){ ui.renameModal=null; render(); } };

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `<h3>Rename Shape</h3>`;
  const f = field('Name','text', rm.value, v=>rm.value=v);
  modal.appendChild(f);

  const commit = ()=>{
    const dp = ui.draftPhone;
    const s = dp && dp.shapes.find(x=>x.id===rm.shapeId);
    if(s) s.name = rm.value.trim();
    ui.renameModal = null;
    render();
  };

  const input = f.querySelector('input');
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') commit(); });
  setTimeout(()=>{ input.focus(); input.select(); }, 0);

  const actions = document.createElement('div');
  actions.className = 'modal-actions';
  actions.appendChild(mkBtn('Cancel','btn-ghost', ()=>{ ui.renameModal=null; render(); }));
  actions.appendChild(mkBtn('Save','btn-primary', commit));
  modal.appendChild(actions);

  overlay.appendChild(modal);
  return overlay;
}

function moveShape(idx, dir){
  const dp = ui.draftPhone;
  const j = idx+dir;
  if(j<0 || j>=dp.shapes.length) return;
  const tmp = dp.shapes[idx];
  dp.shapes[idx] = dp.shapes[j];
  dp.shapes[j] = tmp;
  render();
}

function shapeLabel(type){
  return ({ rect:'Rectangle', circle:'Circle', ellipse:'Ellipse', triangle:'Triangle', star:'Star', hexagon:'Hexagon', line:'Line' })[type] || type;
}
function shapeDisplayName(shape, idx){
  const custom = (shape.name || '').trim();
  return custom ? custom : `${shapeLabel(shape.type)} ${idx+1}`;
}

function savePhoneDraft(){
  const dp = ui.draftPhone;
  if(!dp.name || !dp.name.trim()){ toast('Give the phone a name'); return; }
  if(ui.editingPhoneId){
    const idx = data.phones.findIndex(p=>p.id===ui.editingPhoneId);
    data.phones[idx] = dp;
  } else {
    dp.id = uid();
    data.phones.unshift(dp);
  }
  save();
  ui.view = 'list';
  ui.draftPhone = null;
  render();
  toast('Phone saved');
}

/* ==================== PHONE-SPECIFIC APP OPTIMIZATIONS ==================== */
function openAppOptEditor(appId){
  const dp = ui.draftPhone;
  const existing = getPhoneAppOptimization(dp, appId);
  if(existing){
    ui.appOptDraft = JSON.parse(JSON.stringify(existing));
  } else {
    const app = getApp(appId);
    if(!app) return;
    ui.appOptDraft = {
      appId,
      reqs: JSON.parse(JSON.stringify(app.reqs)),
      otherRequiredComponentIds: JSON.parse(JSON.stringify(app.otherRequiredComponentIds||[])),
      osRequirements: JSON.parse(JSON.stringify(app.osRequirements||[]))
    };
  }
  REQ_KEYS.forEach(k=>{ if(!ui.appOptDraft.reqs[k]) ui.appOptDraft.reqs[k] = { value:null, exact:false, weight:null }; });
  ui.appOptAppPicker = false;
  render();
}
function saveAppOptDraft(){
  const dp = ui.draftPhone;
  const draft = ui.appOptDraft;
  if(!dp.appOptimizations) dp.appOptimizations = [];
  const idx = dp.appOptimizations.findIndex(o=>o.appId===draft.appId);
  if(idx>=0) dp.appOptimizations[idx] = draft; else dp.appOptimizations.push(draft);
  ui.appOptDraft = null;
  render();
  toast('App optimization saved');
}

function cloneComponent(id){
  const c = getComponent(id);
  if(!c) return;
  const copy = JSON.parse(JSON.stringify(c));
  copy.id = uid();
  copy.name = c.name + ' Copy';
  data.components.unshift(copy);
  save(); render(); toast('Component cloned');
}

function cascadeDeleteComponent(id){
  data.phones.forEach(p=>{
    if(p.batteryId===id) p.batteryId=null;
    if(p.processorId===id) p.processorId=null;
    if(p.screenId===id) p.screenId=null;
    if(p.ramId===id) p.ramId=null;
    if(p.cameraIds) p.cameraIds = p.cameraIds.filter(cid=>cid!==id);
    if(p.otherComponentIds) p.otherComponentIds = p.otherComponentIds.filter(cid=>cid!==id);
  });
  data.apps.forEach(app=>{
    if(app.otherRequiredComponentIds) app.otherRequiredComponentIds = app.otherRequiredComponentIds.filter(cid=>cid!==id);
  });
  data.components = data.components.filter(c=>c.id!==id);
}
function deleteComponent(id){
  if(!confirm('Delete this component permanently? It will also be removed from every phone and app that uses it.')) return;
  cascadeDeleteComponent(id);
  save(); render(); toast('Component deleted');
}

function openComponentEditor(type, id){

      panel.appendChild(hintEl('Each tick, durability is rolled randomly between Min and Max, so wear speed varies. Higher durability = slower wear. Quality lost that tick ≈ (100 − rolled durability) / 20.'));

      panel.appendChild(field('Processing Quality','number', dc.processingQuality, v=>dc.processingQuality=numOr(v,0)));
      break;

      panel.appendChild(field('Durability Max (%)','number', dc.durabilityMax, v=>dc.durabilityMax=clamp(numOr(v,0),0,100)));
      panel.appendChild(hintEl('Each tick, durability is rolled randomly between Min and Max, so wear speed varies. Higher durability = slower wear. Quality lost that tick ≈ (100 − rolled durability) / 20.'));
      break;
    case 'camera':

      panel.appendChild(field('Sensor Size','number', dc.sensorSize, v=>dc.sensorSize=numOr(v,0)));
      break;

      panel.appendChild(textareaField('Description', dc.description||'', v=>dc.description=v));

function textareaField(label, value, onInput){
  const f = document.createElement('div');
  f.className = 'field';
  const l = document.createElement('label'); l.textContent = label;
  const t = document.createElement('textarea');
  t.value = value;
  t.rows = 4;
  t.style.cssText = 'background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:9px 11px; border-radius:7px; font-family:inherit; font-size:13px; outline:none; width:100%; resize:vertical;';
  t.addEventListener('input', ()=> onInput(t.value));
  f.append(l,t);
  return f;
}
function hintEl(text){
  const h = document.createElement('div');
  h.className = 'hint';
  h.style.marginBottom = '14px';
  h.textContent = text;
  return h;
}

function cascadeDeleteVersion(versionId){
  data.phones.forEach(p=>{ if(p.osVersionId===versionId) p.osVersionId=null; });
  data.apps.forEach(app=>{
    if(app.osRequirements) app.osRequirements = app.osRequirements.filter(r=>r.versionId!==versionId);
  });
  data.osVersions = data.osVersions.filter(v=>v.id!==versionId);
}
function deleteVersion(id){
  if(!confirm('Delete this version permanently? This will also clear it from any phone or app that references it.')) return;
  cascadeDeleteVersion(id);
  save(); render(); toast('Version deleted');
}

function cascadeDeleteOS(osId){
  getOSVersionsByOS(osId).forEach(v=> cascadeDeleteVersion(v.id));
  data.phones.forEach(p=>{ if(p.osId===osId){ p.osId=null; p.osVersionId=null; } });
  data.apps.forEach(app=>{
    if(app.osRequirements) app.osRequirements = app.osRequirements.filter(r=>r.osId!==osId);
  });
  data.operatingSystems = data.operatingSystems.filter(o=>o.id!==osId);
}
function deleteOS(id){
  if(!confirm('Delete this Operating System and all its versions? This will also clear it from every phone and app that references it.')) return;
  cascadeDeleteOS(id);
  save(); render(); toast('Operating System deleted');
}

/* ---- Operating System picker: two-step (choose OS, then choose one of its versions).
   Used both for a phone's single OS+version slot, and for an app's "Operating System
   Requirements" list (which can hold several OS+version pairs, one version per OS). ---- */
function renderOSPickerModal(){
  const picker = ui.osPicker;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = (e)=>{ if(e.target===overlay){ ui.osPicker=null; render(); } };

  const modal = document.createElement('div');
  modal.className = 'modal wide';

  if(picker.step==='version'){
    const os = getOS(picker.osId);
    modal.innerHTML = `<h3>${escapeHtml(os?os.name:'Unknown')} — Choose Version</h3>`;
    const back = document.createElement('div');
    back.className = 'back-link';
    back.style.marginBottom = '12px';
    back.textContent = '← Back to Operating Systems';
    back.onclick = ()=>{ picker.step='os'; picker.osId=null; render(); };
    modal.appendChild(back);

    const versions = [...getOSVersionsByOS(picker.osId)].sort((a,b)=> b.seq - a.seq);
    if(versions.length===0){
      const e = document.createElement('div'); e.className='empty-note'; e.textContent='No versions created for this OS yet';
      modal.appendChild(e);
    }
    versions.forEach(v=>{
      const row = document.createElement('div');
      row.className = 'picker-row';
      row.innerHTML = `
        <div>
          <div class="name">${escapeHtml(v.name)}</div>
          <div class="sub">Optimization ${v.optimization}</div>
        </div>
      `;
      row.appendChild(mkBtn('Select','btn-sm btn-primary', ()=>{
        if(picker.mode==='appReq'){
          const da = ui.draftApp;
          da.osRequirements = da.osRequirements.filter(r=>r.osId!==picker.osId);
          da.osRequirements.push({ osId:picker.osId, versionId:v.id });
          picker.step = 'os'; picker.osId = null;
          render();
        } else if(picker.mode==='phoneOptReq'){
          const draft = ui.appOptDraft;
          draft.osRequirements = draft.osRequirements.filter(r=>r.osId!==picker.osId);
          draft.osRequirements.push({ osId:picker.osId, versionId:v.id });
          picker.step = 'os'; picker.osId = null;
          render();
        } else {
          ui.draftPhone.osId = picker.osId;
          ui.draftPhone.osVersionId = v.id;
          ui.osPicker = null;
          render();
        }
      }));
      modal.appendChild(row);
    });
  } else {
    modal.innerHTML = `<h3>Choose Operating System</h3>`;
    if(data.operatingSystems.length===0){
      const e = document.createElement('div'); e.className='empty-note'; e.textContent='No Operating Systems created yet — head to Create → Components → Operating Systems.';
      modal.appendChild(e);
    }
    data.operatingSystems.forEach(os=>{
      const verCount = getOSVersionsByOS(os.id).length;
      const row = document.createElement('div');
      row.className = 'picker-row';
      row.innerHTML = `
        <div>
          <div class="name">${escapeHtml(os.name)}</div>
          <div class="sub">${verCount} version${verCount!==1?'s':''}</div>
        </div>
      `;
      const btn = mkBtn('Select','btn-sm btn-primary', ()=>{ picker.step='version'; picker.osId=os.id; render(); });
      if(verCount===0){ btn.disabled = true; btn.title = 'No versions created yet'; }
      row.appendChild(btn);
      modal.appendChild(row);
    });
  }

  const actions = document.createElement('div');
  actions.className = 'modal-actions';
  actions.appendChild(mkBtn((picker.mode==='appReq'||picker.mode==='phoneOptReq') ? 'Done' : 'Cancel','btn-ghost', ()=>{ ui.osPicker=null; render(); }));
  modal.appendChild(actions);

  overlay.appendChild(modal);
  return overlay;
}

function cloneApp(id){

  if(!app) return;
  const copy = JSON.parse(JSON.stringify(app));
  copy.id = uid();
  copy.name = app.name + ' Copy';
  data.apps.unshift(copy);
  save(); render(); toast('App cloned');
}
function cascadeDeleteApp(id){
  data.accounts.forEach(a=>{
    a.inventory.forEach(item=>{
      if(item.installedApps) item.installedApps = item.installedApps.filter(aid=>aid!==id);
    });
  });
  data.apps = data.apps.filter(a=>a.id!==id);
}
function deleteApp(id){
  if(!confirm('Delete this app permanently? It will also be uninstalled from every phone that has it.')) return;
  cascadeDeleteApp(id);
  save(); render(); toast('App deleted');
}

/* ---- a single spec-requirement row: optional number value + "exact or higher" checkbox ---- */
function buildReqField(label, reqObj){
  const wrap = document.createElement('div');
  wrap.className = 'field';
  const l = document.createElement('label'); l.textContent = label;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; align-items:center; gap:10px;';

  const input = document.createElement('input');
  input.type = 'number'; input.step = 'any';
  input.placeholder = 'blank = not required';
  input.value = (reqObj.value===null || reqObj.value===undefined) ? '' : reqObj.value;
  input.style.flex = '1';
  input.addEventListener('input', ()=>{
    reqObj.value = input.value==='' ? null : parseFloat(input.value);
  });

  const checkLabel = document.createElement('label');
  checkLabel.style.cssText = 'display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); white-space:nowrap; text-transform:none; letter-spacing:0; font-family:inherit; font-weight:500;';
  const check = document.createElement('input');
  check.type = 'checkbox';
  check.style.cssText = 'width:auto; padding:0;';
  check.checked = !!reqObj.exact;
  check.addEventListener('change', ()=>{ reqObj.exact = check.checked; });
  checkLabel.append(check, document.createTextNode('Exact or higher'));

  row.append(input, checkLabel);
  wrap.append(l, row);

  /* Weight (%) — how much this requirement contributes to the final Usability average.
     Leave blank and the simulator auto-splits the remaining percentage equally among
     every other requirement that also has no manually assigned weight. */
  const weightRow = document.createElement('div');
  weightRow.style.cssText = 'display:flex; align-items:center; gap:8px; margin-top:6px;';
  const weightLabel = document.createElement('span');
  weightLabel.textContent = 'Weight (%)';
  weightLabel.style.cssText = 'font-size:11px; color:var(--muted-2); font-family:\'JetBrains Mono\',monospace; white-space:nowrap;';
  const weightInput = document.createElement('input');
  weightInput.type = 'number'; weightInput.step = 'any'; weightInput.min = 0; weightInput.max = 100;
  weightInput.placeholder = 'auto';
  weightInput.value = (reqObj.weight===null || reqObj.weight===undefined) ? '' : reqObj.weight;
  weightInput.style.cssText = 'width:90px; background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:7px 9px; border-radius:6px; font-family:\'JetBrains Mono\',monospace; font-size:12px; outline:none;';
  weightInput.addEventListener('input', ()=>{
    reqObj.weight = weightInput.value==='' ? null : clamp(numOr(weightInput.value,0),0,100);
  });
  weightRow.append(weightLabel, weightInput);
  wrap.appendChild(weightRow);

  return wrap;
}
